name: discoverd
arch: ${GOARCH}
platform: linux
version: ${VERSION}
section: net
priority: optional
maintainer: napilab
description: |
  Lightweight UDP multicast service discovery with HMAC authentication.
  Supports server and client modes with timestamp and nonce replay protection.
license: GPL-3.0
homepage: https://github.com/napilab/discoverd

contents:
  - src: .deb-staging/discoverd
    dst: /usr/bin/discoverd
    file_info:
      mode: 0755

  - src: deploy/systemd/discoverd.service
    dst: /lib/systemd/system/discoverd.service
    file_info:
      mode: 0644

  - src: deploy/systemd/discoverd.env.example
    dst: /etc/discoverd
    type: config|noreplace
    file_info:
      mode: 0644

scripts:
  postinstall: deploy/deb/postinst
  preremove: deploy/deb/prerm
